<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chika · Chitra Katha</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="chika-brand.css" />
<style>
  html, body { margin: 0; padding: 0; background: #0c0907; height: 100%; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  /* page-scrubber range */
  input[type="range"].scrub {
    -webkit-appearance: none; appearance: none; width: 100%; height: 34px; background: transparent; margin: 0;
  }
  input[type="range"].scrub::-webkit-slider-runnable-track {
    height: 10px; border-radius: 999px; border: 2.5px solid var(--ink);
    background: linear-gradient(to right, var(--ochre) var(--fill,0%), #2a201c var(--fill,0%));
    box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  }
  input[type="range"].scrub::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 26px; height: 26px; margin-top: -10.5px;
    border-radius: 50%; background: var(--ochre); border: 3px solid var(--ink);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.6); cursor: pointer;
  }
  input[type="range"].scrub::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%; background: var(--ochre); border: 3px solid var(--ink); cursor: pointer;
  }
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="chika-app.jsx"></script>
</body>
</html>
