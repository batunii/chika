# XcodeGen spec for the Chika iOS app. The Xcode project is generated, not committed:
#   xcodegen generate --spec iosApp/project.yml --project iosApp
# The Kotlin :shared framework is built by a pre-build script phase (and explicitly in CI), so
# opening the generated project in Xcode "just works" as long as a JDK is on PATH.
name: Chika
options:
  bundleIdPrefix: com.chakra
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.19"
  # FOSS RAR5 reader: libarchive's BSD-licensed C library as a prebuilt xcframework. We depend on
  # the raw `libarchive` C product (not the package's Swift wrapper, whose writer fails Swift 6
  # strict-concurrency checks on current toolchains) and read it via a small C-API wrapper — we
  # only need to read CBR/RAR and repackage as CBZ.
  SwiftArchive:
    url: https://github.com/matteo-pacini/libarchive-for-swift
    exactVersion: "1.0.0"

targets:
  Chika:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: ZIPFoundation
      - package: SwiftArchive
        product: libarchive
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Chika
        UILaunchScreen: {}
        UIAppFonts:
          - Anton-Regular.ttf
          - Archivo-Variable.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSSupportsOpeningDocumentsInPlace: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: Comic Book Archive
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.chakra.comicreader.cbz
              - com.chakra.comicreader.cbr
              - public.zip-archive
        # Exported (not Imported): the app OWNS these types, so the system knows .cbz is a zip and
        # .cbr a data file — otherwise the file importer greys these files out as unselectable.
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.chakra.comicreader.cbz
            UTTypeDescription: Comic Book ZIP Archive
            UTTypeConformsTo:
              - public.zip-archive
            UTTypeTagSpecification:
              public.filename-extension:
                - cbz
          - UTTypeIdentifier: com.chakra.comicreader.cbr
            UTTypeDescription: Comic Book RAR Archive
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - cbr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chakra.comicreader
        TARGETED_DEVICE_FAMILY: "1,2"
        # $(inherited) keeps the values CocoaPods injects via its xcconfig (needed to link
        # TensorFlowLite) alongside our Kotlin-framework search path / link flag.
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/bin/iosArm64/releaseFramework"
        "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]":
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/releaseFramework"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "ChikaShared"
    preBuildScripts:
      - name: Build Kotlin shared framework
        script: |
          cd "$SRCROOT/.."
          if [ "$PLATFORM_NAME" = "iphonesimulator" ]; then
            ./gradlew :shared:linkReleaseFrameworkIosSimulatorArm64
          else
            ./gradlew :shared:linkReleaseFrameworkIosArm64
          fi
        basedOnDependencyAnalysis: false

schemes:
  Chika:
    build:
      targets:
        Chika: all
    run:
      config: Debug
    archive:
      config: Release
