name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # compileSdk 36 / buildToolsVersion 36.1.0 are pinned in app/build.gradle.kts.
      # AGP will auto-download them (licenses are accepted by setup-android); this makes it explicit
      # and fails fast with a clear message if a pinned version isn't available on the runner.
      - name: Install required SDK packages
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Shared module unit tests
        run: ./gradlew :shared:jvmTest --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Android Lint (informational)
        continue-on-error: true
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: chika-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore

  # Verifies the shared module's iOS targets (Kotlin/Native) and runs the common test suite on an
  # iOS simulator. Standard macOS runners are free for public repositories.
  ios-shared:
    name: Shared module (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile iOS targets
        run: ./gradlew :shared:compileKotlinIosArm64 :shared:compileKotlinIosSimulatorArm64 --stacktrace

      - name: Run common tests on iOS simulator
        run: ./gradlew :shared:iosSimulatorArm64Test --stacktrace

  # Builds the unsigned iOS app IPA. Sideload it onto a device with AltStore/Sideloadly (it is
  # signed at install time with the user's own Apple ID), or sign in a release pipeline later.
  ios-app:
    name: iOS app (unsigned IPA)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Kotlin shared framework (device)
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64 --stacktrace

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec iosApp/project.yml --project iosApp

      - name: Build app (unsigned)
        run: |
          xcodebuild -project iosApp/Chika.xcodeproj -scheme Chika -configuration Release \
            -sdk iphoneos -derivedDataPath iosApp/build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R "iosApp/build/Build/Products/Release-iphoneos/Chika.app" Payload/
          zip -qry Chika-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: chika-ios-unsigned-ipa
          path: Chika-unsigned.ipa
          if-no-files-found: error
