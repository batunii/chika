name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # compileSdk 36 / buildToolsVersion 36.1.0 are pinned in app/build.gradle.kts.
      # AGP will auto-download them (licenses are accepted by setup-android); this makes it explicit
      # and fails fast with a clear message if a pinned version isn't available on the runner.
      - name: Install required SDK packages
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Shared module unit tests
        run: ./gradlew :shared:jvmTest --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Android Lint (informational)
        continue-on-error: true
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: chika-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore

  # Verifies the shared module's iOS targets (Kotlin/Native) and runs the common test suite on an
  # iOS simulator. Standard macOS runners are free for public repositories.
  ios-shared:
    name: Shared module (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile iOS targets
        run: ./gradlew :shared:compileKotlinIosArm64 :shared:compileKotlinIosSimulatorArm64 --stacktrace

      - name: Run common tests on iOS simulator
        run: ./gradlew :shared:iosSimulatorArm64Test --stacktrace
