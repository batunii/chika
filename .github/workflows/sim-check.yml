name: Sim Check

# Visual verification loop for the iOS reader when no local Xcode is available: build the app for
# the simulator, boot an iPhone 13 Pro Max (428x926pt — the framing-bug report device class), drive
# the reader with the CHIKA_DEBUG_* hooks onto a synthetic test comic (iosApp/ci/SyntheticManga.cbz,
# generated art — no copyrighted content), and upload screenshots as artifacts for inspection.
on:
  push:
    branches: [ "ci/sim-check" ]
  workflow_dispatch:

jobs:
  sim:
    name: Boot simulator and screenshot the reader
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Kotlin shared framework (simulator)
        run: |
          chmod +x ./gradlew
          ./gradlew :shared:linkReleaseFrameworkIosSimulatorArm64 --stacktrace

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec iosApp/project.yml --project iosApp

      - name: Install pods
        run: cd iosApp && pod install

      - name: Build app (simulator)
        run: |
          xcodebuild -workspace iosApp/Chika.xcworkspace -scheme Chika -configuration Debug \
            -sdk iphonesimulator -derivedDataPath iosApp/build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Create and boot simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl create chika-test \
            com.apple.CoreSimulator.SimDeviceType.iPhone-13-Pro-Max 2>/dev/null) \
          || DEVICE=$(xcrun simctl create chika-test \
            com.apple.CoreSimulator.SimDeviceType.iPhone-14-Plus)
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE"
          xcrun simctl bootstatus "$DEVICE" -b
          xcrun simctl list devices | grep chika-test

      - name: Install app and seed test comic
        run: |
          DEVICE='${{ steps.sim.outputs.device }}'
          xcrun simctl install "$DEVICE" iosApp/build/Build/Products/Debug-iphonesimulator/Chika.app
          CONT=$(xcrun simctl get_app_container "$DEVICE" com.chakra.comicreader data)
          mkdir -p "$CONT/Documents/Comics"
          cp iosApp/ci/SyntheticManga.cbz "$CONT/Documents/Comics/"

      # Scenario 1: page 0, panel 1 (RTL) — the framed-panel camera. The green debug overlay in the
      # screenshot reports the canvas size + zoom/pan the draw actually used.
      - name: Screenshot panel framing
        run: |
          DEVICE='${{ steps.sim.outputs.device }}'
          SIMCTL_CHILD_CHIKA_DEBUG_OPEN=Synthetic \
          SIMCTL_CHILD_CHIKA_DEBUG_PAGE=0 \
          SIMCTL_CHILD_CHIKA_DEBUG_STEP=0 \
          SIMCTL_CHILD_CHIKA_DEBUG_RTL=1 \
            xcrun simctl launch "$DEVICE" com.chakra.comicreader
          sleep 20
          xcrun simctl io "$DEVICE" screenshot sim-panel1.png

      # Scenario 2: cold relaunch on the whole-page intro with the numbered detection overlay.
      - name: Screenshot detection overlay
        run: |
          DEVICE='${{ steps.sim.outputs.device }}'
          xcrun simctl terminate "$DEVICE" com.chakra.comicreader || true
          for i in $(seq 1 20); do
            xcrun simctl spawn "$DEVICE" launchctl list 2>/dev/null | grep -q com.chakra.comicreader || break
            sleep 1
          done
          sleep 2
          SIMCTL_CHILD_CHIKA_DEBUG_OPEN=Synthetic \
          SIMCTL_CHILD_CHIKA_DEBUG_PAGE=0 \
          SIMCTL_CHILD_CHIKA_DEBUG_BOXES=1 \
          SIMCTL_CHILD_CHIKA_DEBUG_RTL=1 \
            xcrun simctl launch "$DEVICE" com.chakra.comicreader
          sleep 20
          xcrun simctl io "$DEVICE" screenshot sim-boxes.png

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-screenshots
          path: |
            sim-panel1.png
            sim-boxes.png
          if-no-files-found: error
