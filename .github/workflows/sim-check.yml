name: Sim Check

# Visual verification for the iOS reader: build the app once, then screenshot the reader across a
# device matrix (big phone / small phone / current flagship / iPad) in both reading directions,
# using the CHIKA_DEBUG_* hooks on a synthetic test comic (iosApp/ci/SyntheticManga.cbz — generated
# art, no copyrighted content). Screenshots upload as artifacts for inspection.
on:
  push:
    branches: [ "ci/sim-check" ]
  workflow_dispatch:

jobs:
  build:
    name: Build simulator app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Kotlin shared framework (simulator)
        run: |
          chmod +x ./gradlew
          ./gradlew :shared:linkReleaseFrameworkIosSimulatorArm64 --stacktrace

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec iosApp/project.yml --project iosApp

      - name: Install pods
        run: cd iosApp && pod install

      - name: Build app (simulator)
        run: |
          xcodebuild -workspace iosApp/Chika.xcworkspace -scheme Chika -configuration Debug \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath iosApp/build ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: chika-sim-app
          path: iosApp/build/Build/Products/Debug-iphonesimulator/Chika.app
          if-no-files-found: error

  matrix:
    name: ${{ matrix.label }}
    needs: build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: iphone-13-pro-max
            devicetype: iPhone 13 Pro Max
          - label: iphone-se-3
            devicetype: iPhone SE (3rd generation)
          - label: iphone-16-pro-max
            devicetype: iPhone 16 Pro Max
          - label: ipad-pro-11
            devicetype: iPad Pro 11-inch (M4)
    steps:
      - name: Checkout (for the test comic)
        uses: actions/checkout@v4
        with:
          sparse-checkout: iosApp/ci

      - name: Download app bundle
        uses: actions/download-artifact@v4
        with:
          name: chika-sim-app
          path: Chika.app

      - name: Boot simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl create matrix-test "${{ matrix.devicetype }}")
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE"
          xcrun simctl bootstatus "$DEVICE" -b

      - name: Install app and seed test comic
        run: |
          DEVICE='${{ steps.sim.outputs.device }}'
          xcrun simctl install "$DEVICE" Chika.app
          CONT=$(xcrun simctl get_app_container "$DEVICE" com.chakra.comicreader data)
          mkdir -p "$CONT/Documents/Comics"
          cp iosApp/ci/SyntheticManga.cbz "$CONT/Documents/Comics/"

      - name: Screenshot RTL panel 1
        run: |
          DEVICE='${{ steps.sim.outputs.device }}'
          SIMCTL_CHILD_CHIKA_DEBUG_OPEN=Synthetic \
          SIMCTL_CHILD_CHIKA_DEBUG_PAGE=0 \
          SIMCTL_CHILD_CHIKA_DEBUG_STEP=0 \
          SIMCTL_CHILD_CHIKA_DEBUG_RTL=1 \
            xcrun simctl launch "$DEVICE" com.chakra.comicreader
          sleep 20
          xcrun simctl io "$DEVICE" screenshot "${{ matrix.label }}-rtl-panel1.png"

      - name: Screenshot LTR panel 1
        run: |
          DEVICE='${{ steps.sim.outputs.device }}'
          xcrun simctl terminate "$DEVICE" com.chakra.comicreader || true
          for i in $(seq 1 20); do
            xcrun simctl spawn "$DEVICE" launchctl list 2>/dev/null | grep -q com.chakra.comicreader || break
            sleep 1
          done
          sleep 2
          SIMCTL_CHILD_CHIKA_DEBUG_OPEN=Synthetic \
          SIMCTL_CHILD_CHIKA_DEBUG_PAGE=0 \
          SIMCTL_CHILD_CHIKA_DEBUG_STEP=0 \
          SIMCTL_CHILD_CHIKA_DEBUG_RTL=0 \
            xcrun simctl launch "$DEVICE" com.chakra.comicreader
          sleep 20
          xcrun simctl io "$DEVICE" screenshot "${{ matrix.label }}-ltr-panel1.png"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shots-${{ matrix.label }}
          path: "*.png"
          if-no-files-found: error
